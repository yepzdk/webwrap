name: Release

# Builds a universal (arm64 + x86_64) release binary on tag push and attaches
# a tarball to the GitHub release. The Homebrew formula downloads this tarball,
# so end users never need Xcode or the Swift toolchain.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v5

      - name: Show toolchain
        run: swift --version

      - name: Build universal release binary
        run: |
          swift build -c release --arch arm64 --arch x86_64
          # The universal product path is stable across arches:
          BIN=$(swift build -c release --arch arm64 --arch x86_64 --show-bin-path)
          echo "BIN_PATH=$BIN/webwrap" >> "$GITHUB_ENV"

      - name: Verify the binary is universal
        run: lipo -info "$BIN_PATH"

      - name: Package tarball
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          STAGE="webwrap-${VERSION}-macos-universal"
          mkdir -p "$STAGE"
          cp "$BIN_PATH" "$STAGE/webwrap"
          cp README.md LICENSE "$STAGE/"
          chmod +x "$STAGE/webwrap"
          tar -czf "${STAGE}.tar.gz" "$STAGE"
          shasum -a 256 "${STAGE}.tar.gz" | tee "${STAGE}.tar.gz.sha256"

      - name: Attach to release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            webwrap-*.tar.gz
            webwrap-*.tar.gz.sha256
          generate_release_notes: true

  # Bump the Homebrew formula in the yepzdk/homebrew-tools tap to point at the
  # release this tag just built, so `brew upgrade webwrap` picks it up without a
  # manual formula edit. Requires a HOMEBREW_TAP_TOKEN secret: a PAT with contents
  # write on the tap repo (the default GITHUB_TOKEN can't push cross-repo).
  update-tap:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Check out the tap
        uses: actions/checkout@v5
        with:
          repository: yepzdk/homebrew-tools
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Bump the webwrap formula
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          TARBALL="webwrap-${VERSION}-macos-universal.tar.gz"
          URL="https://github.com/yepzdk/webwrap/releases/download/${GITHUB_REF_NAME}/${TARBALL}"

          # Recompute the sha from the published asset rather than trusting an input,
          # so the formula always matches what users actually download.
          curl -fsSL "$URL" -o "$TARBALL"
          SHA="$(shasum -a 256 "$TARBALL" | cut -d' ' -f1)"
          rm -f "$TARBALL"

          FORMULA="Formula/webwrap.rb"
          sed -i -E \
            -e "s|url \".*\"|url \"${URL}\"|" \
            -e "s|version \".*\"|version \"${VERSION}\"|" \
            -e "s|# From the release: .*|# From the release: ${TARBALL}.sha256|" \
            -e "s|sha256 \".*\"|sha256 \"${SHA}\"|" \
            -e "s|assert_match \"[0-9.]+\"|assert_match \"${VERSION}\"|" \
            "$FORMULA"

          echo "Updated formula:"
          cat "$FORMULA"

      - name: Commit and push
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "Formula already up to date; nothing to commit."
            exit 0
          fi
          git commit -am "Update webwrap to ${VERSION}"
          git push
